<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <div class="box">

        <h1>Login</h1>

        <p>
            Securely access your account and continue your journey with Synent Technologies.
        </p>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

        <a href="/forgot/">Forgot Password?</a>

        <p>
            Don't have account?
            <a href="/signup/">Signup</a>
        </p>

    </div>

</div>

</body>
</html>
