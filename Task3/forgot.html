<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <div class="box">

        <h1>Reset Password</h1>

        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="email"
            name="email"
            placeholder="Enter your email"
            required>

            <input type="password"
            name="new_password"
            placeholder="New Password"
            required>

            <input type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            required>

            <button type="submit">
                Reset Password
            </button>

        </form>

        <p>
            <a href="/">
                Back to Login
            </a>
        </p>

    </div>

</div>

</body>
</html>
