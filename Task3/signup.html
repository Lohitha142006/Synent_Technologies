<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <div class="box">

        <h1>Signup</h1>
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
         {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text"
            name="username"
            placeholder="Username"
            required>

            <input type="email"
            name="email"
            placeholder="Email"
            required>

            <input type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have account?
            <a href="/">Login</a>
        </p>

    </div>

</div>

</body>
</html>
